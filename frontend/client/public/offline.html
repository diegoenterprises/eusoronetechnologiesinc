<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EusoTrip — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, rgba(20,115,255,0.12), transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(190,1,255,0.08), transparent 60%),
                  #060918;
      font-family: 'Gilroy-Bold', system-ui, -apple-system, sans-serif;
      color: #e2e8f0;
    }
    .container { text-align: center; padding: 40px 24px; max-width: 420px; }
    .logo { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(20,115,255,0.25), 0 0 80px rgba(190,1,255,0.1); }
    h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #1473FF 50%, #BE01FF 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p { font-size: 14px; color: rgba(148,163,184,0.7); line-height: 1.6; margin-bottom: 24px; }
    .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .retry-btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
      background: linear-gradient(135deg, #1473FF, #BE01FF); color: #fff;
      border: none; border-radius: 12px; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.3px; transition: transform 0.15s, box-shadow 0.15s;
    }
    .retry-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(20,115,255,0.3); }
    .retry-btn:active { transform: translateY(0); }
    .hint { font-size: 11px; color: rgba(148,163,184,0.4); margin-top: 20px; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <img src="/eusotrip-logo.png" alt="EusoTrip" class="logo" />
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be unavailable until you're back online.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Try Again
    </button>
    <div class="hint">Cached data will still be available</div>
  </div>
</body>
</html>
